<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>조선 무협 SRPG v0.5 - 백두산 설문 관문전</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="battle-stage" aria-label="2D 타일 전장">
      <header class="battle-topbar">
        <div class="title-block">
          <p class="kicker">Joseon Murim SRPG</p>
          <h1>백두산 설문 관문전</h1>
        </div>
        <div class="phase-card player" id="phaseCard">
          <span id="phaseLabel">Player Phase</span>
          <strong>TURN <b id="roundCounter">1</b></strong>
        </div>
        <div class="topbar-tools">
          <button id="briefingButton" class="small-button" type="button">작전 브리핑</button>
          <button id="dangerToggle" class="small-button" type="button" aria-pressed="false">적 사정권</button>
          <button id="endPhaseButton" class="primary-button" type="button">페이즈 종료</button>
          <button id="restartButton" class="icon-button" type="button" title="새 전투">↻</button>
        </div>
      </header>

      <div id="guidePanel" class="guide-panel" aria-live="polite"></div>

      <div class="map-wrap">
        <div id="battlefield" class="battlefield painted" aria-label="전장 타일맵"></div>
        <div id="phaseBanner" class="phase-banner" aria-hidden="true"><span class="pb-text"></span></div>
        <div class="map-caption">
          <strong>目標</strong>
          <span>중원 감찰단이 설문(雪門)을 넘기 전에 저지한다 — 사절 주홍문을 제압하거나 항복시킬 것.</span>
        </div>
      </div>
    </section>

    <aside class="command-panel" aria-label="전투 지휘 패널">
      <section class="panel-section selected-panel" id="selectedPanel"></section>
      <section class="panel-section command-section">
        <h2>명령</h2>
        <div id="actionBar" class="action-bar"></div>
      </section>
      <section class="panel-section forecast-panel" id="forecastPanel"></section>
      <section class="panel-section tile-panel" id="tilePanel"></section>
    </aside>

    <section class="roster-panel" aria-label="부대 현황">
      <div class="roster-column">
        <h2>해동문 아군</h2>
        <ol id="allyRoster" class="roster-list"></ol>
      </div>
      <div class="roster-column">
        <h2>중원 사절단</h2>
        <ol id="enemyRoster" class="roster-list"></ol>
      </div>
    </section>

    <section class="combat-log-wrap" aria-label="전투 로그">
      <div class="log-title">
        <h2>Combat Log</h2>
        <span id="seedLabel">seed</span>
      </div>
      <ol id="combatLog" class="combat-log"></ol>
    </section>
  </main>

  <div id="introOverlay" class="overlay" hidden></div>
  <div id="resultOverlay" class="overlay" hidden></div>

  <script src="./app.js"></script>
</body>
</html>
